name: Generate All Tools

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * *'

# Give the default GITHUB_TOKEN write permissions for pages and contents
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code - Using the latest v4
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Python - Using the latest v5
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. Install dependencies
      - name: Install dependencies
        run: pip install pandas jinja2

      # 4. Generate pages
      - name: Generate all tool pages
        run: python generate_all_tools.py

      # 5. Copy CNAME file if it exists
      - name: Copy CNAME file
        run: cp CNAME generated_pages/ || echo "No CNAME file found, skipping."

      # 6. Deploy to GitHub Pages - Using the latest v4 with explicit config
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          # CRITICAL: Use the Personal Access Token you created and added as a secret
          github_token: ${{ secrets.DEPLOY_KEY }}
          publish_dir: ./generated_pages
          # Clean the destination branch (gh-pages) before deploying
          clean: true
          # Force push to overwrite history, avoids conflicts
          force_orphan: true
          # Set user info for the git commit
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
