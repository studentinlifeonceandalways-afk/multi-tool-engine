name: Generate All Tools

on:
  push:
    branches: [ gh-pages ]
  schedule:
    - cron: '0 0 * * *'
  # Add workflow_dispatch to manually trigger
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    # Add permissions - CRITICAL for GitHub Pages
    permissions:
      contents: write
      pages: write
      id-token: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: pip install pandas jinja2
      
      - name: Generate all tool pages
        run: python generate_all_tools.py
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./generated_pages
          # These help with the 128 error
          force_orphan: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
