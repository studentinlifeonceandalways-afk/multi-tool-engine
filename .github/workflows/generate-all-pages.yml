name: Generate All Tools

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Updated checkout action to v4
      - uses: actions/checkout@v4
      
      # Updated setup-python action to v5
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - run: pip install pandas jinja2
      - run: python generate_all_tools.py
      
      # Updated gh-pages action to v4
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./generated_pages
